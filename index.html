<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>股市大富翁 - 投資模擬器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'tw-up': '#ff3333',   // 台灣股市漲 (紅)
                        'tw-down': '#00aa00', // 台灣股市跌 (綠)
                        'tw-panel': '#1e293b'
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0f172a; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .flash-up { animation: flashRed 0.5s ease-out; }
        .flash-down { animation: flashGreen 0.5s ease-out; }
        @keyframes flashRed { 0% { background-color: rgba(255, 51, 51, 0.5); } 100% { background-color: transparent; } }
        @keyframes flashGreen { 0% { background-color: rgba(0, 170, 0, 0.5); } 100% { background-color: transparent; } }
        
        #toast-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 50; display: flex; flex-direction: column; gap: 10px; align-items: center; pointer-events: none; }
        .toast { background-color: rgba(0, 0, 0, 0.85); color: white; padding: 12px 24px; border-radius: 8px; font-size: 16px; font-weight: bold; animation: fadeInOut 3s forwards; border: 1px solid #475569; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        @keyframes fadeInOut { 0% { opacity: 0; transform: translateY(-20px); } 10% { opacity: 1; transform: translateY(0); } 90% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-20px); } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <!-- 浮動提示訊息容器 -->
    <div id="toast-container"></div>

    <!-- 啟動設定畫面 -->
    <div id="setup-screen" class="bg-tw-panel p-8 rounded-2xl shadow-2xl max-w-md w-full border border-gray-700">
        <h1 class="text-3xl font-bold text-center mb-6 text-blue-400">📊 股市大富翁</h1>
        <p class="text-gray-400 text-center mb-8 text-sm">請設定初始條件，遊戲中請聽從老師指示點擊突發新聞。</p>
        
        <div class="mb-6">
            <h2 class="text-lg font-semibold mb-3">1. 選擇初始資金</h2>
            <div class="grid grid-cols-2 gap-3" id="capital-options">
                <button onclick="selectCapital(100000, this)" class="cap-btn py-2 border border-gray-600 rounded-lg hover:bg-gray-700 transition">10 萬 (打工族)</button>
                <button onclick="selectCapital(300000, this)" class="cap-btn py-2 border border-gray-600 rounded-lg hover:bg-gray-700 transition">30 萬 (新鮮人)</button>
                <button onclick="selectCapital(500000, this)" class="cap-btn py-2 border border-gray-600 rounded-lg hover:bg-gray-700 transition">50 萬 (小主管)</button>
                <button onclick="selectCapital(1000000, this)" class="cap-btn py-2 border border-gray-600 rounded-lg hover:bg-gray-700 transition">100 萬 (大戶)</button>
            </div>
        </div>

        <div class="mb-8">
            <h2 class="text-lg font-semibold mb-3">2. 選擇交易時間</h2>
            <div class="grid grid-cols-2 md:grid-cols-3 gap-3" id="time-options">
                <button onclick="selectTime(2, this)" class="time-btn py-2 border border-gray-600 rounded-lg hover:bg-gray-700 transition">2 分鐘 (極限)</button>
                <button onclick="selectTime(3, this)" class="time-btn py-2 border border-gray-600 rounded-lg hover:bg-gray-700 transition">3 分鐘 (當沖)</button>
                <button onclick="selectTime(5, this)" class="time-btn py-2 border border-gray-600 rounded-lg hover:bg-gray-700 transition">5 分鐘 (短線)</button>
                <button onclick="selectTime(10, this)" class="time-btn py-2 border border-gray-600 rounded-lg hover:bg-gray-700 transition">10 分鐘 (波段)</button>
                <button onclick="selectTime(15, this)" class="time-btn py-2 border border-gray-600 rounded-lg hover:bg-gray-700 transition">15 分鐘 (長期)</button>
            </div>
        </div>

        <button onclick="startGame()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-lg text-lg transition shadow-lg">進入交易市場 🚀</button>
    </div>

    <!-- 遊戲主畫面 -->
    <div id="game-screen" class="hidden w-full max-w-5xl flex flex-col gap-4">
        
        <!-- 盤中新聞控制台 (學生點擊區) -->
        <div class="bg-gray-800 rounded-xl p-3 border border-yellow-600/50 shadow-lg flex flex-col items-start gap-3">
            <div class="text-yellow-400 font-bold text-sm whitespace-nowrap flex items-center gap-2">
                <span class="animate-pulse">🌍</span> 總體經濟環境 (請依據老師指示點選)：
            </div>
            <div class="grid grid-cols-2 md:grid-cols-3 gap-3 w-full">
                <!-- 新增了 scenario-btn 類別與 btn-xxx ID，並將 normal 設為預設亮起 -->
                <button id="btn-normal" onclick="triggerEvent('normal')" class="scenario-btn ring-2 ring-yellow-400 ring-offset-2 ring-offset-gray-800 scale-[1.02] z-10 bg-gray-700 hover:bg-gray-600 border border-gray-500 text-white text-xs font-bold py-2 px-2 rounded transition relative">
                    ☕ 恢復平穩日常
                </button>
                <button id="btn-tech_boom" onclick="triggerEvent('tech_boom')" class="scenario-btn bg-red-900/50 hover:bg-tw-up border border-tw-up/50 text-white text-xs font-bold py-2 px-2 rounded transition relative">
                    🚀 AI 科技大爆發
                </button>
                <button id="btn-war_crisis" onclick="triggerEvent('war_crisis')" class="scenario-btn bg-green-900/50 hover:bg-tw-down border border-tw-down/50 text-white text-xs font-bold py-2 px-2 rounded transition relative">
                    💣 地緣政治戰爭
                </button>
                <button id="btn-rate_hike" onclick="triggerEvent('rate_hike')" class="scenario-btn bg-green-900/50 hover:bg-tw-down border border-tw-down/50 text-white text-xs font-bold py-2 px-2 rounded transition relative">
                    📉 央行強力升息
                </button>
                <button id="btn-pandemic" onclick="triggerEvent('pandemic')" class="scenario-btn bg-gray-700 hover:bg-gray-600 border border-gray-400 text-white text-xs font-bold py-2 px-2 rounded transition relative">
                    🦠 全球疫情爆發
                </button>
                <button id="btn-value_recovery" onclick="triggerEvent('value_recovery')" class="scenario-btn bg-red-900/50 hover:bg-tw-up border border-tw-up/50 text-white text-xs font-bold py-2 px-2 rounded transition relative">
                    🏭 傳統產業復甦
                </button>
            </div>
        </div>

        <!-- 頂部資訊列 -->
        <div class="bg-tw-panel rounded-xl p-4 flex flex-wrap justify-between items-center shadow-lg border border-gray-700">
            <div class="flex items-center gap-4">
                <div class="text-gray-400">倒數計時 <br> <span id="timer" class="text-3xl font-mono text-white font-bold">00:00</span></div>
            </div>
            <div class="text-center">
                <div class="text-gray-400">總資產價值 (現值)</div>
                <div id="total-net-worth" class="text-4xl font-mono font-bold text-yellow-400">$0</div>
            </div>
            <div class="text-right">
                <div class="text-gray-400">可用現金</div>
                <div id="cash-balance" class="text-2xl font-mono text-white">$0</div>
                <div id="roi-display" class="text-sm font-bold mt-1">報酬率: 0.00%</div>
            </div>
        </div>

        <!-- 股票卡片區 -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4" id="assets-container">
            <!-- 卡片由 JS 動態生成 -->
        </div>

    </div>

    <!-- 結束畫面 -->
    <div id="end-screen" class="hidden bg-tw-panel p-8 rounded-2xl shadow-2xl max-w-md w-full border border-gray-700 text-center mx-auto">
        <h1 class="text-4xl font-bold mb-4 text-white">結算報告 📜</h1>
        <p class="text-gray-400 mb-6">市場收盤，系統已自動為您平倉結算。</p>
        
        <div class="bg-gray-800 rounded-lg p-4 mb-6 text-left">
            <div class="flex justify-between mb-2"><span class="text-gray-400">初始本金:</span> <span id="end-initial" class="font-mono font-bold text-white"></span></div>
            <div class="flex justify-between mb-2"><span class="text-gray-400">最終資產:</span> <span id="end-final" class="font-mono font-bold text-white"></span></div>
            <div class="flex justify-between border-t border-gray-600 pt-2 mt-2"><span class="text-gray-400">總損益:</span> <span id="end-profit" class="font-mono font-bold"></span></div>
        </div>

        <div class="text-2xl mb-8">投資報酬率 (ROI) <br> <span id="end-roi" class="text-5xl font-bold font-mono block mt-2"></span></div>
        
        <button onclick="location.reload()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-lg text-lg transition">再來一局 🔄</button>
    </div>

    <script>
        // 系統狀態
        let config = { capital: null, time: null };
        let state = {
            cash: 0,
            initialCapital: 0,
            timeRemaining: 0,
            assets: {
                A: { name: '台積電 (2330)', desc: '高風險 / 科技權值 (證交稅 0.3%)', price: 2250, initialPrice: 2250, shares: 0, avgCost: 0, defaultVol: 0.03, vol: 0.03, drift: 0, type: 'int', taxRate: 0.003 },
                B: { name: '元大台灣50 (0050)', desc: '中風險 / 市值型 ETF (證交稅 0.1%)', price: 155, initialPrice: 155, shares: 0, avgCost: 0, defaultVol: 0.015, vol: 0.015, drift: 0, type: 'int', taxRate: 0.001 },
                C: { name: '元大美債20年 (00679B)', desc: '低風險 / 防禦型美債 (免交易稅)', price: 29.5, initialPrice: 29.5, shares: 0, avgCost: 0, defaultVol: 0.002, vol: 0.002, drift: 0, type: 'float', taxRate: 0 }
            },
            gameInterval: null,
            tickInterval: null,
            feeRate: 0.001425 // 券商手續費 0.1425%
        };

        const fmt = (num) => new Intl.NumberFormat('zh-TW').format(num);

        function selectCapital(val, btn) {
            config.capital = val;
            document.querySelectorAll('.cap-btn').forEach(el => { el.classList.remove('bg-blue-600', 'text-white', 'border-blue-400'); el.classList.add('border-gray-600'); });
            btn.classList.add('bg-blue-600', 'text-white', 'border-blue-400');
            btn.classList.remove('border-gray-600');
        }

        function selectTime(val, btn) {
            config.time = val;
            document.querySelectorAll('.time-btn').forEach(el => { el.classList.remove('bg-blue-600', 'text-white', 'border-blue-400'); el.classList.add('border-gray-600'); });
            btn.classList.add('bg-blue-600', 'text-white', 'border-blue-400');
            btn.classList.remove('border-gray-600');
        }

        function showToast(message, colorClass = '') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${colorClass}`;
            toast.innerText = message;
            container.appendChild(toast);
            setTimeout(() => { toast.remove(); }, 4000);
        }

        function startGame() {
            if (!config.capital || !config.time) {
                alert('請先選擇初始資金與交易時間！'); return;
            }

            state.initialCapital = config.capital;
            state.cash = config.capital;
            state.timeRemaining = config.time * 60;

            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');

            const container = document.getElementById('assets-container');
            container.innerHTML = ''; 

            ['A', 'B', 'C'].forEach(assetKey => {
                let obj = state.assets[assetKey];
                
                let cardHTML = `
                <div class="bg-tw-panel rounded-xl flex flex-col shadow-lg overflow-hidden border border-gray-700" id="card-${assetKey}">
                    <div class="p-4 border-b border-gray-700 bg-gray-800/50 flex justify-between items-center transition-colors duration-300" id="card-header-${assetKey}">
                        <div>
                            <h3 class="text-lg font-bold text-white">${obj.name}</h3>
                            <p class="text-xs text-gray-400">${obj.desc}</p>
                        </div>
                        <div class="text-right">
                            <div class="text-xs text-gray-500 mb-1">開盤價: ${obj.initialPrice}</div>
                            <div id="price-${assetKey}" class="text-3xl font-bold font-mono text-white">${obj.type === 'int' ? obj.price : obj.price.toFixed(2)}</div>
                            <div id="change-${assetKey}" class="text-sm font-bold mt-1 text-gray-400">0.00%</div>
                        </div>
                    </div>
                    
                    <div class="p-4 grid grid-cols-2 gap-4 text-sm bg-gray-900/50">
                        <div><span class="text-gray-400 block mb-1">持有股數</span><span id="shares-${assetKey}" class="font-mono text-lg font-bold text-white">0</span> 股</div>
                        <div><span class="text-gray-400 block mb-1">平均成本</span><span id="cost-${assetKey}" class="font-mono text-lg font-bold text-white">0</span></div>
                        <div class="col-span-2 flex justify-between items-center border-t border-gray-700 pt-2">
                            <span class="text-gray-400">未實現損益 (已扣稅費)</span>
                            <span id="pnl-${assetKey}" class="font-mono text-xl font-bold text-gray-400">0</span>
                        </div>
                    </div>

                    <div class="p-3 bg-gray-800/30 flex flex-col gap-2 border-t border-gray-700 mt-auto">
                        <div class="flex items-center gap-1">
                            <span class="text-tw-up font-bold text-xs w-8">買進</span>
                            <div class="grid grid-cols-4 gap-1 flex-1">
                                <button onclick="trade('${assetKey}', 'buy', '1')" class="bg-red-900/40 hover:bg-tw-up border border-tw-up/50 text-white py-1.5 rounded text-xs transition">1 股</button>
                                <button onclick="trade('${assetKey}', 'buy', '10')" class="bg-red-900/40 hover:bg-tw-up border border-tw-up/50 text-white py-1.5 rounded text-xs transition">10 股</button>
                                <button onclick="trade('${assetKey}', 'buy', '100')" class="bg-red-900/40 hover:bg-tw-up border border-tw-up/50 text-white py-1.5 rounded text-xs transition">100 股</button>
                                <button onclick="trade('${assetKey}', 'buy', '1000')" class="bg-red-900/40 hover:bg-tw-up border border-tw-up/50 text-white py-1.5 rounded text-xs transition">1 張</button>
                            </div>
                        </div>
                        <div class="flex items-center gap-1">
                            <span class="text-tw-down font-bold text-xs w-8">賣出</span>
                            <div class="grid grid-cols-4 gap-1 flex-1">
                                <button onclick="trade('${assetKey}', 'sell', '1')" class="bg-green-900/40 hover:bg-tw-down border border-tw-down/50 text-white py-1.5 rounded text-xs transition">1 股</button>
                                <button onclick="trade('${assetKey}', 'sell', '10')" class="bg-green-900/40 hover:bg-tw-down border border-tw-down/50 text-white py-1.5 rounded text-xs transition">10 股</button>
                                <button onclick="trade('${assetKey}', 'sell', '100')" class="bg-green-900/40 hover:bg-tw-down border border-tw-down/50 text-white py-1.5 rounded text-xs transition">100 股</button>
                                <button onclick="trade('${assetKey}', 'sell', '1000')" class="bg-green-900/40 hover:bg-tw-down border border-tw-down/50 text-white py-1.5 rounded text-xs transition">1 張</button>
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-1 mt-1">
                            <button onclick="trade('${assetKey}', 'buy', 'max')" class="bg-gray-700/50 hover:bg-gray-600 text-tw-up font-bold py-1.5 rounded text-xs transition border border-gray-600">最大買進 (Max)</button>
                            <button onclick="trade('${assetKey}', 'sell', 'all')" class="bg-gray-700/50 hover:bg-gray-600 text-tw-down font-bold py-1.5 rounded text-xs transition border border-gray-600">全部平倉 (All)</button>
                        </div>
                    </div>
                </div>`;
                container.innerHTML += cardHTML;
            });

            updateUI();
            
            state.gameInterval = setInterval(() => {
                state.timeRemaining--;
                let m = Math.floor(state.timeRemaining / 60).toString().padStart(2, '0');
                let s = (state.timeRemaining % 60).toString().padStart(2, '0');
                document.getElementById('timer').innerText = `${m}:${s}`;
                if (state.timeRemaining <= 0) endGame();
            }, 1000);

            state.tickInterval = setInterval(() => tickPrices(false), 2500);
        }

        // 盤中事件觸發引擎：產生瞬間衝擊 (Shock) 與後續趨勢 (Drift)
        function triggerEvent(scenario) {
            // UI 更新：處理按鈕高亮狀態
            document.querySelectorAll('.scenario-btn').forEach(btn => {
                btn.classList.remove('ring-2', 'ring-yellow-400', 'ring-offset-2', 'ring-offset-gray-800', 'scale-[1.02]', 'z-10');
            });
            let activeBtn = document.getElementById(`btn-${scenario}`);
            if(activeBtn) {
                activeBtn.classList.add('ring-2', 'ring-yellow-400', 'ring-offset-2', 'ring-offset-gray-800', 'scale-[1.02]', 'z-10');
            }

            let A = state.assets.A;
            let B = state.assets.B;
            let C = state.assets.C;

            if (scenario === 'tech_boom') {
                showToast("重大新聞發布：AI 科技取得重大突破！科技股狂飆！", "!bg-tw-up !border-red-400");
                A.price = Math.round(A.price * 1.15); 
                B.price = Math.round(B.price * 1.05); 
                C.price = parseFloat((C.price * 0.98).toFixed(1)); 
                A.vol = A.defaultVol * 1.5; A.drift = 0.006; 
                B.drift = 0.002;
                C.drift = -0.0005;

            } else if (scenario === 'war_crisis') {
                showToast("重大新聞發布：地緣政治衝突爆發！市場極度恐慌！", "!bg-tw-down !border-green-400");
                A.price = Math.round(A.price * 0.85); 
                B.price = Math.round(B.price * 0.90); 
                C.price = parseFloat((C.price * 1.08).toFixed(1)); 
                A.vol = A.defaultVol * 2.0; A.drift = -0.008; 
                B.drift = -0.004;
                C.vol = C.defaultVol * 3; C.drift = 0.002;

            } else if (scenario === 'rate_hike') {
                showToast("重大新聞發布：央行宣布強力升息！資金退潮，股債雙殺！", "!bg-tw-down !border-green-400");
                // 升息不利所有資產，尤其是高估值科技股和債券價格
                A.price = Math.round(A.price * 0.92); 
                B.price = Math.round(B.price * 0.95); 
                C.price = parseFloat((C.price * 0.96).toFixed(1)); 
                A.drift = -0.003; 
                B.drift = -0.001;
                C.drift = -0.001;

            } else if (scenario === 'pandemic') {
                showToast("重大新聞發布：全球未知疫情擴散！遠距需求大增，百業蕭條！", "!border-gray-400");
                // 疫情：科技(遠距)漲，大盤(實體)跌，債券(避險/降息預期)漲
                A.price = Math.round(A.price * 1.08); 
                B.price = Math.round(B.price * 0.90); 
                C.price = parseFloat((C.price * 1.05).toFixed(1)); 
                A.drift = 0.003; 
                B.drift = -0.005;
                C.drift = 0.001;

            } else if (scenario === 'value_recovery') {
                showToast("重大新聞發布：傳統產業迎來大復甦！資金從科技股輪動至大盤！", "!bg-tw-up !border-red-400");
                // 傳產復甦：科技股資金被抽走，0050(包含金融傳產)大漲
                A.price = Math.round(A.price * 0.96); 
                B.price = Math.round(B.price * 1.08); 
                C.price = parseFloat((C.price * 0.99).toFixed(1)); 
                A.drift = -0.001; 
                B.drift = 0.004;
                C.drift = 0;

            } else {
                showToast("市場快訊：危機解除，市場回歸平穩日常。");
                A.vol = A.defaultVol; A.drift = 0;
                B.vol = B.defaultVol; B.drift = 0;
                C.vol = C.defaultVol; C.drift = 0;
            }

            // 強制立即更新畫面以反映價格衝擊
            tickPrices(true);
        }

        // 價格跳動邏輯 (forceUIUpdate 參數用於事件發生時的強制刷新)
        function tickPrices(forceUIUpdate = false) {
            ['A', 'B', 'C'].forEach(assetKey => {
                let obj = state.assets[assetKey];
                let oldPrice = obj.price;
                
                if (!forceUIUpdate) {
                    let rand = (Math.random() + Math.random() + Math.random() + Math.random() - 2) / 2;
                    let changePercent = (rand * obj.vol) + obj.drift;
                    let newPrice = oldPrice * (1 + changePercent);
                    obj.price = obj.type === 'int' ? Math.round(newPrice) : parseFloat(newPrice.toFixed(1));
                    if (obj.price <= 0.1) obj.price = obj.type === 'int' ? 1 : 0.1;
                }

                let headerEl = document.getElementById(`card-header-${assetKey}`);
                headerEl.classList.remove('flash-up', 'flash-down');
                void headerEl.offsetWidth;
                
                if (obj.price > oldPrice || (forceUIUpdate && obj.drift > 0)) {
                    headerEl.classList.add('flash-up');
                } else if (obj.price < oldPrice || (forceUIUpdate && obj.drift < 0)) {
                    headerEl.classList.add('flash-down');
                }

                let priceEl = document.getElementById(`price-${assetKey}`);
                let changeEl = document.getElementById(`change-${assetKey}`);
                
                priceEl.innerText = obj.type === 'int' ? fmt(obj.price) : obj.price.toFixed(1);
                
                let totalChangePercent = ((obj.price - obj.initialPrice) / obj.initialPrice) * 100;
                let sign = totalChangePercent >= 0 ? '+' : '';
                changeEl.innerText = `${sign}${totalChangePercent.toFixed(2)}%`;
                
                if (totalChangePercent > 0) {
                    priceEl.className = 'text-3xl font-bold font-mono text-tw-up';
                    changeEl.className = 'text-sm font-bold mt-1 text-tw-up';
                } else if (totalChangePercent < 0) {
                    priceEl.className = 'text-3xl font-bold font-mono text-tw-down';
                    changeEl.className = 'text-sm font-bold mt-1 text-tw-down';
                } else {
                    priceEl.className = 'text-3xl font-bold font-mono text-white';
                    changeEl.className = 'text-sm font-bold mt-1 text-gray-400';
                }
            });
            updateUI();
        }

        // 交易邏輯 (買進/賣出)
        function trade(assetKey, action, mode) {
            let obj = state.assets[assetKey];
            
            if (action === 'buy') {
                let maxShares = Math.floor(state.cash / (obj.price * (1 + state.feeRate)));
                let qty = 0;
                
                if (mode === 'max') {
                    qty = maxShares;
                    if (qty <= 0) { showToast('可用現金不足，無法買進！'); return; }
                } else {
                    let reqQty = parseInt(mode);
                    if (reqQty > maxShares) {
                        showToast(`現金不足，無法買進 ${reqQty} 股！(最多可買 ${maxShares} 股)`);
                        return;
                    }
                    qty = reqQty;
                }

                let principal = qty * obj.price;
                let fee = Math.max(1, Math.floor(principal * state.feeRate));
                let totalCost = principal + fee;

                let oldTotalCost = obj.shares * obj.avgCost;
                obj.shares += qty;
                obj.avgCost = (oldTotalCost + totalCost) / obj.shares;
                
                state.cash -= totalCost;
                showToast(`買進 ${qty} 股 ${obj.name}，手續費 $${fmt(fee)}`);
                
            } else if (action === 'sell') {
                let qty = 0;
                
                if (mode === 'all') {
                    qty = obj.shares;
                    if (qty <= 0) { showToast('目前無持股可賣出！'); return; }
                } else {
                    let reqQty = parseInt(mode);
                    if (reqQty > obj.shares) {
                        showToast(`庫存不足，無法賣出 ${reqQty} 股！(庫存僅剩 ${obj.shares} 股)`);
                        return;
                    }
                    qty = reqQty;
                }

                let principal = qty * obj.price;
                let fee = Math.max(1, Math.floor(principal * state.feeRate));
                let tax = obj.taxRate > 0 ? Math.max(1, Math.floor(principal * obj.taxRate)) : 0;
                let netProceeds = principal - fee - tax; 

                obj.shares -= qty;
                if (obj.shares === 0) obj.avgCost = 0; 
                
                state.cash += netProceeds;
                showToast(`賣出 ${qty} 股 ${obj.name}，扣手續費 $${fmt(fee)} / 稅金 $${fmt(tax)}`);
            }
            
            updateUI();
        }

        function updateUI() {
            let totalStockValue = 0;
            
            ['A', 'B', 'C'].forEach(assetKey => {
                let obj = state.assets[assetKey];
                
                let currentNetVal = 0;
                if (obj.shares > 0) {
                    let principal = obj.shares * obj.price;
                    let estFee = Math.max(1, Math.floor(principal * state.feeRate));
                    let estTax = obj.taxRate > 0 ? Math.max(1, Math.floor(principal * obj.taxRate)) : 0;
                    currentNetVal = principal - estFee - estTax;
                }
                
                totalStockValue += currentNetVal;

                document.getElementById(`shares-${assetKey}`).innerText = fmt(obj.shares);
                document.getElementById(`cost-${assetKey}`).innerText = obj.type === 'int' ? fmt(Math.round(obj.avgCost)) : obj.avgCost.toFixed(2);
                
                let totalCost = obj.avgCost * obj.shares;
                let pnl = currentNetVal - totalCost;
                
                let pnlEl = document.getElementById(`pnl-${assetKey}`);
                if (obj.shares > 0) {
                    let sign = pnl >= 0 ? '+' : '';
                    pnlEl.innerText = `${sign}${fmt(Math.round(pnl))}`;
                    pnlEl.className = `font-mono text-xl font-bold text-right ${pnl >= 0 ? 'text-tw-up' : 'text-tw-down'}`;
                } else {
                    pnlEl.innerText = '0';
                    pnlEl.className = 'font-mono text-xl font-bold text-right text-gray-500';
                }
            });

            document.getElementById('cash-balance').innerText = `$${fmt(Math.round(state.cash))}`;
            
            let netWorth = state.cash + totalStockValue;
            document.getElementById('total-net-worth').innerText = `$${fmt(Math.round(netWorth))}`;
            
            let roi = ((netWorth - state.initialCapital) / state.initialCapital) * 100;
            let roiEl = document.getElementById('roi-display');
            let roiSign = roi >= 0 ? '+' : '';
            roiEl.innerText = `報酬率: ${roiSign}${roi.toFixed(2)}%`;
            roiEl.className = `text-sm font-bold mt-1 ${roi >= 0 ? 'text-tw-up' : 'text-tw-down'}`;
        }

        function endGame() {
            clearInterval(state.gameInterval);
            clearInterval(state.tickInterval);
            
            ['A', 'B', 'C'].forEach(assetKey => {
                if(state.assets[assetKey].shares > 0) trade(assetKey, 'sell', 'all');
            });

            document.getElementById('game-screen').classList.add('hidden');
            let endScreen = document.getElementById('end-screen');
            endScreen.classList.remove('hidden');

            let finalNetWorth = state.cash; 
            let profit = finalNetWorth - state.initialCapital;
            let roi = (profit / state.initialCapital) * 100;

            document.getElementById('end-initial').innerText = `$${fmt(state.initialCapital)}`;
            document.getElementById('end-final').innerText = `$${fmt(Math.round(finalNetWorth))}`;
            
            let profitEl = document.getElementById('end-profit');
            profitEl.innerText = `${profit >= 0 ? '+' : ''}$${fmt(Math.round(profit))}`;
            profitEl.className = `font-mono font-bold ${profit >= 0 ? 'text-tw-up' : 'text-tw-down'}`;

            let roiEl = document.getElementById('end-roi');
            roiEl.innerText = `${roi >= 0 ? '+' : ''}${roi.toFixed(2)}%`;
            roiEl.className = `text-5xl font-bold font-mono block mt-2 ${roi >= 0 ? 'text-tw-up' : 'text-tw-down'}`;
        }
    </script>
</body>
</html>
